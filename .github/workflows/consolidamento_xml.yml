name: Consolidamento Registro XML

on:
  push:
    paths:
      - 'uploads/**'

# Impostiamo la variabile a livello di job per forzare Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5 # Passiamo alla v5 (o successiva disponibile nel 2026)

      - name: Estrazione e Filtro
        run: |
          mkdir -p registro_files/
          mkdir -p temp_stage/

          # 1. Copia i file XML sfusi caricati in uploads/
          find uploads/ -maxdepth 1 -name "*.xml" -exec cp {} temp_stage/ \;

          # 2. Gestione ZIP: Ciclo for per estrarre ogni archivio trovato
          # Usiamo '|| true' per evitare che il workflow si blocchi se non ci sono zip
          for f in uploads/*.zip; do
            [ -e "$f" ] || continue
            echo "Estrazione di $f..."
            unzip -o "$f" -d temp_zip_extract/
            find temp_zip_extract/ -name "*.xml" -exec cp {} temp_stage/ \;
            rm -rf temp_zip_extract/
          done

          # 3. Consolidamento finale (solo se sono stati trovati file XML)
          if [ -n "$(ls -A temp_stage/*.xml 2>/dev/null)" ]; then
            cp -r temp_stage/*.xml registro_files/
          else
            echo "Attenzione: Nessun file XML trovato tra sfusi e ZIP."
          fi

          # 4. Pulizia totale della cartella uploads
          rm -rf uploads/*
          touch uploads/.gitkeep

      - name: Crea Pull Request per Utente A
        uses: peter-evans/create-pull-request@v7 # Aggiornato alla v7 per Node 24
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Aggiornamento automatico registro XML (Node 24)"
          branch: revisione-dati-giornalieri
          delete-branch: true
          title: "📂 Revisione Dati XML - $(date +'%d/%m/%Y')"
          body: |
            Aggiornamento consolidato (compatibile con Node.js 24).
            - XML estratti e consolidati.
            - JSON scartati.
