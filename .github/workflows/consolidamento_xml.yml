name: Consolidamento Registro XML
run-name: "📦 [ID-${{ github.event.run_id }}] Consolidamento da ${{ github.actor }}"

on:
  push:
    paths:
      - 'uploads/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Genera Timestamp e ID
        id: vars
        run: |
          ID_COMUNE=$(date +'%Y%m%d-%H%M')
          echo "id_comune=$ID_COMUNE" >> $GITHUB_OUTPUT
          echo "today=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: Estrazione e Filtro
        id: filter
        run: |
          # 1. Pulizia totale preventiva delle aree di transito
          rm -rf temp_stage temp_zip_extract
          mkdir -p registro_files/
          mkdir -p temp_stage/
          
          # 2. Cattura gli XML sciolti direttamente da uploads/
          find uploads/ -maxdepth 1 -name "*.xml" -exec cp {} temp_stage/ \;
          
          # 3. Estrai gli XML dagli archivi ZIP
          for f in uploads/*.zip; do
            [ -e "$f" ] || continue
            mkdir -p temp_zip_extract/
            unzip -o "$f" -d temp_zip_extract/
            find temp_zip_extract/ -name "*.xml" -exec cp {} temp_stage/ \;
            rm -rf temp_zip_extract/
          done
          
          # 4. Conta ed elenca SOLO i file appena processati in temp_stage
          COUNT=$(ls -1 temp_stage/*.xml 2>/dev/null | wc -l)
          FILE_LIST=$(ls -1 temp_stage/*.xml 2>/dev/null | xargs -n 1 basename | sed 's/^/- /')
          
          {
            echo "file_count=$COUNT"
            echo "file_names<<EOF"
            echo "$FILE_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          # 5. Sposta nel registro SOLO i file della sessione corrente
          if [ $COUNT -gt 0 ]; then
            mv temp_stage/*.xml registro_files/
          fi
          
          # 6. Ripristina lo stato pulito di uploads/
          rm -rf uploads/*
          touch uploads/.gitkeep
          
          # 7. Rimuovi la cartella temporanea per non inquinare il prossimo ciclo
          rm -rf temp_stage/

      - name: Crea Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Aggiornamento XML ID-${{ steps.vars.outputs.id_comune }}"
          branch: revisione-xml-${{ steps.vars.outputs.id_comune }}
          delete-branch: true
          title: "📂 Revisione XML [${{ steps.vars.outputs.id_comune }}]"
          labels: |
            auto-tag
            ID-${{ steps.vars.outputs.id_comune }}
          body: |
            ### 🤖 Report Consolidamento [ID: ${{ steps.vars.outputs.id_comune }}]
            - **Data:** ${{ steps.vars.outputs.today }}
            - **File:** `${{ steps.filter.outputs.file_count }}`
            
            ${{ steps.filter.outputs.file_names }}
