name: Consolidamento Registro XML

on:
  push:
    paths:
      - 'uploads/**' # Si attiva ogni volta che carichi file in questa cartella

# Forza l'uso del runtime Node.js 24 per tutte le Action (Standard 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      # Genera data e ora per rendere unica ogni operazione e ogni PR
      - name: Genera Timestamp
        id: date
        run: |
          echo "today=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H:%M:%S')" >> $GITHUB_OUTPUT
          echo "branch_id=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Estrazione e Filtro
        id: filter
        run: |
          # 1. Crea le directory di lavoro temporanee
          mkdir -p registro_files/
          mkdir -p temp_stage/

          # 2. Copia i file XML già sfusi presenti in uploads/
          find uploads/ -maxdepth 1 -name "*.xml" -exec cp {} temp_stage/ \;

          # 3. Gestione archivi ZIP
          for f in uploads/*.zip; do
            [ -e "$f" ] || continue
            echo "Elaborazione archivio: $f"
            mkdir -p temp_zip_extract/
            unzip -o "$f" -d temp_zip_extract/
            find temp_zip_extract/ -name "*.xml" -exec cp {} temp_stage/ \;
            rm -rf temp_zip_extract/
          done

          # 4. Generazione statistiche per il body della PR
          # Conta i file trovati
          COUNT=$(ls -1 temp_stage/*.xml 2>/dev/null | wc -l)
          # Crea una lista testuale dei nomi dei file (senza il percorso)
          FILE_LIST=$(ls -1 temp_stage/*.xml 2>/dev/null | xargs -n 1 basename | sed 's/^/- /')
          
          # Salva i dati negli output dello step per usarli nella PR
          {
            echo "file_count=$COUNT"
            echo "file_names<<EOF"
            echo "$FILE_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # 5. Sposta i file nel registro finale
          if [ $COUNT -gt 0 ]; then
            cp -r temp_stage/*.xml registro_files/
          fi

          # 6. Puliziauploads/
          rm -rf uploads/*
          touch uploads/.gitkeep

      - name: Crea Pull Request per Utente A
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Aggiornamento automatico registro XML - ${{ steps.date.outputs.branch_id }}"
          branch: revisione-xml-${{ steps.date.outputs.branch_id }}
          delete-branch: true
          title: "📂 Revisione XML: ${{ steps.date.outputs.today }} (Ore ${{ steps.date.outputs.time }})"
          body: |
            ### 🤖 Report Consolidamento Automatico
            - **Data operazione:** ${{ steps.date.outputs.today }}
            - **Orario:** ${{ steps.date.outputs.time }}
            - **Totale file XML processati:** `${{ steps.filter.outputs.file_count }}`
            
            #### 📄 Elenco file inclusi:
            ${{ steps.filter.outputs.file_names }}
            
            ---
            **Note:**
            - I file JSON e altri formati sono stati scartati.
            - Se l'elenco non corrisponde alle aspettative, chiudi questa PR.
