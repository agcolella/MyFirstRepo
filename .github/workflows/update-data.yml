name: Aggiornamento Automatico Dati Registro

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Imposta la variabile d'ambiente a livello globale per il workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5 # Aggiornato a v5

      - name: Configurazione ambiente Node.js
        uses: actions/setup-node@v5 # Aggiornato a v5
        with:
          node-version: '24' # Aggiornato a Node.js 24
          cache: 'npm'

      - name: Installazione Dipendenze
        run: npm install # Usiamo install per generare/aggiornare in sicurezza se manca il lock

      - name: Esecuzione script di backend
        run: npm start
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit e Push del file data.json aggiornato
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Forza l'aggiunta anche se fosse presente nel .gitignore (risolve il problema del file mancante)
          git add -f data.json
          
          if [ -f "data.json" ] && [ -n "$(git status --porcelain data.json)" ]; then
            echo "Rilevate modifiche in data.json. Eseguo il commit..."
            git commit -m "Automated: Aggiornato data.json con lo stato corrente delle PR [skip ci]"
            git push
          else
            echo "Nessun aggiornamento o variazione rilevata nei dati."
          fi