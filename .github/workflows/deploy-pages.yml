name: Deploy Dashboard su GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'data.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5 # Aggiornato a v5

      - name: Configura ambiente GitHub Pages
        uses: actions/configure-pages@v5 # Aggiornato a v5

      - name: Carica file statici (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy effettivo su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4