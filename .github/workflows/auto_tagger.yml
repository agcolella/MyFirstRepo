name: Auto-Tag on Merge
# Estraiamo l'ID dal nome del branch per il titolo dell'esecuzione
run-name: "🏷️ [ID-${{ github.event.pull_request.head.ref }}] Creazione Tag"

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag-after-merge:
    if: |
      github.event.pull_request.merged == true && 
      startsWith(github.event.pull_request.head.ref, 'revisione-xml-')
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Crea Tag Immutabile
        run: |
          # Il branch si chiama revisione-xml-YYYYMMDD-HHMM
          # Estraiamo la parte finale (l'ID comune)
          ID_COMUNE=$(echo "${{ github.event.pull_request.head.ref }}" | sed 's/revisione-xml-//')
          
          TAG_NAME="v-$ID_COMUNE"
          
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git tag -a "$TAG_NAME" -m "Snapshot ID-$ID_COMUNE"
          git push origin "$TAG_NAME"
