name: Auto-Tag on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag-after-merge:
    # IL FILTRO: Verifica che la PR sia stata chiusa con merge, 
    # che il branch di origine inizi con 'revisione-xml-'
    # e che abbia la label 'auto-tag'
    if: |
      github.event.pull_request.merged == true && 
      startsWith(github.event.pull_request.head.ref, 'revisione-xml-') &&
      contains(github.event.pull_request.labels.*.name, 'auto-tag')
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Crea Tag Immutabile
        run: |
          # Recuperiamo l'ID dal nome del branch per mantenere coerenza nei tag
          # Il branch è: revisione-xml-YYYYMMDD-HHMMSS
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          ID_PART=$(echo $BRANCH_NAME | sed 's/revisione-xml-//')
          
          TAG_NAME="v-$ID_PART"
          
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git tag -a "$TAG_NAME" -m "Snapshot registro PR #${{ github.event.pull_request.number }}"
          git push origin "$TAG_NAME"
