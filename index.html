<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Metadati - Dashboard PR</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #dee2e6;
            --open-color: #28a745;
            --merged-color: #6f42c1;
            --closed-color: #dc3545;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .search-box {
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f3f5;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .url-link {
            color: var(--primary-color);
            text-decoration: none;
            word-break: break-all;
        }

        .pr-container a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            color: #495057;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-open { background-color: var(--open-color); }
        .badge-merged { background-color: var(--merged-color); }
        .badge-closed { background-color: var(--closed-color); }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Registro Metadati Spid/CIE - Dashboard Controllo</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca per ente, URL o nome file..." onkeyup="filterResults()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Ente</th>
                <th>URL Metadati</th>
                <th>Nome File</th>
                <th>Stato e Riferimento Pull Request</th>
            </tr>
        </thead>
        <tbody id="resultsTableBody">
            </tbody>
    </table>
</div>

<script>
    const REPO_PR_BASE_URL = "https://github.com/agcolella/MyFirstRepo/pull/";
    let dataset = [];

    // Funzione per recuperare i dati generati dai workflow
    async function loadWorkflowData() {
        const tbody = document.getElementById("resultsTableBody");
        if (!tbody) return;
        
        tbody.innerHTML = `<tr><td colspan="4" class="no-results">Caricamento dati in corso...</td></tr>`;

        try {
            const response = await fetch(`data.json?_=${new Date().getTime()}`);
            if (!response.ok) throw new Error(`Stato: ${response.status}`);
            
            dataset = await response.json();
            displayData(dataset);
            
        } catch (error) {
            console.error("Errore di caricamento:", error);
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="no-results" style="color: var(--closed-color);">
                        <strong>Errore di sincronizzazione:</strong> Impossibile caricare i dati del workflow.
                    </td>
                </tr>`;
        }
    }

    // Renderizza la tabella racchiudendo i dati correttamente nei tag <td>
    function displayData(data) {
        const tbody = document.getElementById("resultsTableBody");
        if (!tbody) return;
        
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="no-results">Nessun risultato trovato corrispondente ai criteri di ricerca.</td></tr>`;
            return;
        }

        data.forEach(item => {
            if (!item) return;

            const tr = document.createElement("tr");

            const enteVisivo = item.ente ? item.ente : "Ente non specificato";
            const urlVisivo = item.url ? `<a class="url-link" href="${item.url}" target="_blank">${item.url}</a>` : "Nessun URL";
            const fileVisivo = item.filename ? `<code>${item.filename}</code>` : "---";

            let prCellContent = `<span style="color: #6c757d; font-style: italic;">Nessuna PR</span>`;
            if (item.pr_number) {
                let badgeClass = "badge-open";
                if (item.pr_status === "merged") badgeClass = "badge-merged";
                if (item.pr_status === "closed") badgeClass = "badge-closed";
                
                const statoTesto = item.pr_status ? item.pr_status.toUpperCase() : "UNKNOWN";
                const dataTesto = item.pr_date ? `(${item.pr_date})` : "";

                prCellContent = `
                    <div class="pr-container">
                        <a href="${REPO_PR_BASE_URL}${item.pr_number}" target="_blank">
                            <span><strong>#${item.pr_number}</strong> ${dataTesto}</span>
                            <span class="badge ${badgeClass}">${statoTesto}</span>
                        </a>
                    </div>
                `;
            }

            tr.innerHTML = `
                <td><strong>${enteVisivo}</strong></td>
                <td>${urlVisivo}</td>
                <td>${fileVisivo}</td>
                <td>${prCellContent}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Filtro di ricerca sicuro
    function filterResults() {
        if (!dataset || dataset.length === 0) return;

        const query = document.getElementById("searchInput").value.toLowerCase();
        
        const filtered = dataset.filter(item => {
            if (!item) return false;
            
            const ente = item.ente ? item.ente.toLowerCase() : "";
            const url = item.url ? item.url.toLowerCase() : "";
            const filename = item.filename ? item.filename.toLowerCase() : "";

            return ente.includes(query) || url.includes(query) || filename.includes(query);
        });
        
        displayData(filtered);
    }

    window.onload = function() {
        loadWorkflowData();
    };
</script>

</body>
</html>
