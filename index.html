<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Metadati - Ricerca Enti e PR</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #dee2e6;
            --open-color: #28a745;
            --merged-color: #6f42c1;
            --closed-color: #dc3545;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .search-box {
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.15s ease-in-out;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0,86,179,0.25);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f3f5;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .url-link {
            color: var(--primary-color);
            text-decoration: none;
            word-break: break-all;
        }

        .url-link:hover {
            text-decoration: underline;
        }

        /* Stili specifici per i link e badge delle Pull Request */
        .pr-container a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            color: #495057;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .pr-container a:hover {
            background-color: #e9ecef;
            color: #000;
        }

        .badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
        }

        .badge-open { background-color: var(--open-color); }
        .badge-merged { background-color: var(--merged-color); }
        .badge-closed { background-color: var(--closed-color); }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Registro Metadati Spid/CIE - Dashboard Controllo</h1>
    
    <!-- Barra di Ricerca globale -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca per ente, URL metadati o nome file..." onkeyup="filterResults()">
    </div>

    <!-- Tabella dei risultati -->
    <table>
        <thead>
            <tr>
                <th>Ente</th>
                <th>URL Metadati</th>
                <th>Nome File</th>
                <th>Stato e Riferimento Pull Request</th>
            </tr>
        </thead>
        <tbody id="resultsTableBody">
            <!-- I dati verranno inseriti qui dinamicamente via JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Base URL del repository per le Pull Request
    const REPO_PR_BASE_URL = "https://github.com/agcolella/MyFirstRepo/pull/";

    // Dataset mockup di esempio (strutturato con i campi richiesti).
    // In produzione questa variabile può essere popolata da un file JSON esterno o da una chiamata API.
    const dataset = [
        {
            ente: "Comune di Agrigento",
            url: "https://idp.comune.agrigento.it/metadata.xml",
            filename: "comune_agrigento_metadata.xml",
            pr_number: "42",
            pr_date: "2026-05-10",
            pr_status: "merged"
        },
        {
            ente: "Università degli Studi di Torino",
            url: "https://spid.unito.it/idp/shibboleth",
            filename: "unito_spid_idp.xml",
            pr_number: "55",
            pr_date: "2026-05-24",
            pr_status: "open"
        },
        {
            ente: "Regione Lazio - Sanità",
            url: "https://regione.lazio.it/sanita/spid-metadata.xml",
            filename: "regione_lazio_sanita.xml",
            pr_number: "31",
            pr_date: "2026-04-12",
            pr_status: "closed"
        },
        {
            ente: "Provincia Autonoma di Trento",
            url: "https://login.provincia.tn.it/metadata",
            filename: "prov_trento_metadata.xml",
            pr_number: null, // Caso di test senza PR associata
            pr_date: "",
            pr_status: ""
        }
    ];

    // Funzione per renderizzare la tabella nel DOM
    function displayData(data) {
        const tbody = document.getElementById("resultsTableBody");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="no-results">Nessun risultato trovato corrispondente ai criteri di ricerca.</td></tr>`;
            return;
        }

        data.forEach(item => {
            const tr = document.createElement("tr");

            // Configurazione della cella della Pull Request
            let prCellContent = `<span style="color: #6c757d; font-style: italic;">Nessuna PR</span>`;
            if (item.pr_number) {
                let badgeClass = "badge-open";
                if (item.pr_status === "merged") badgeClass = "badge-merged";
                if (item.pr_status === "closed") badgeClass = "badge-closed";

                // Creazione del link ipertestuale che punta direttamente alla specifica PR sul repo
                prCellContent = `
                    <div class="pr-container">
                        <a href="${REPO_PR_BASE_URL}${item.pr_number}" target="_blank" title="Apri Pull Request #${item.pr_number} su GitHub">
                            <span><strong>#${item.pr_number}</strong> (${item.pr_date})</span>
                            <span class="badge ${badgeClass}">${item.pr_status}</span>
                        </a>
                    </div>
                `;
            }

            tr.innerHTML = `
                <td><strong>${item.ente}</strong></td>
                <td><a class="url-link" href="${item.url}" target="_blank">${item.url}</a></td>
                <td><code>${item.filename}</code></td>
                <td>${prCellContent}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Funzione di filtro attivata alla digitazione (onkeyup)
    function filterResults() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        
        const filtered = dataset.filter(item => {
            return (
                item.ente.toLowerCase().includes(query) ||
                item.url.toLowerCase().includes(query) ||
                item.filename.toLowerCase().includes(query)
            );
        });
        
        displayData(filtered);
    }

    // Caricamento iniziale dei dati alla prima apertura della pagina
    window.onload = function() {
        displayData(dataset);
    };
</script>

</body>
</html>
