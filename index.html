<!DOCTYPE html>
<html>
<head>
    <title>DEBUG CONSOLE</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        .error { color: red; font-weight: bold; border: 2px solid red; padding: 10px; }
        .success { color: green; font-weight: bold; }
        #log { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Diagnostica Dashboard</h1>
    <div id="status">Inizializzazione...</div>
    <hr>
    <h3>Log di sistema:</h3>
    <div id="log"></div>

    <script>
        const CONFIG = {
            user: 'agcolella',
            repo: 'MyFirstRepo',
            folder: 'registro_files'
        };

        const logger = document.getElementById('log');
        const status = document.getElementById('status');

        function addLog(msg, color = "black") {
            const entry = document.createElement('div');
            entry.style.color = color;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logger.appendChild(entry);
        }

        async function startDebug() {
            addLog("Avvio test API...");
            
            try {
                // Test 1: Connessione generica al repository
                addLog(`Controllo repository: ${CONFIG.user}/${CONFIG.repo}...`);
                const resRepo = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}`);
                
                if (!resRepo.ok) {
                    const errorData = await resRepo.json();
                    throw new Error(`GitHub dice: ${resRepo.status} - ${errorData.message}`);
                }
                addLog("✅ Repository trovato!", "green");

                // Test 2: Controllo cartella
                addLog(`Controllo cartella: ${CONFIG.folder}...`);
                const resFiles = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.folder}`);
                
                if (!resFiles.ok) {
                    throw new Error(`Cartella non trovata: ${resFiles.status}`);
                }
                
                const files = await resFiles.json();
                addLog(`✅ Cartella trovata! Contiene ${files.length} elementi.`, "green");

                // Se tutto è ok, mostriamo i nomi dei file
                files.forEach(f => addLog(`-> Trovato file: ${f.name}`));
                
                status.innerHTML = "<span class='success'>SISTEMA OPERATIVO. Se non vedi file qui sopra, la cartella è vuota.</span>";

            } catch (e) {
                addLog(`❌ ERRORE: ${e.message}`, "red");
                status.innerHTML = `<div class="error">TEST FALLITO: ${e.message}</div>`;
            }
        }

        startDebug();
    </script>
</body>
</html>
