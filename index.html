<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Console Registro XML</title>
    <!-- Tailwind caricato in modo più sicuro -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-5 text-blue-400">📂 Registro XML Dashboard</h1>
        
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <div class="flex gap-4 mb-6">
                <input type="text" id="fileSearch" placeholder="Cerca file..." class="bg-slate-700 p-3 rounded w-full border border-slate-600">
                <select id="tagSelect" class="bg-slate-700 p-3 rounded border border-slate-600"></select>
            </div>

            <table class="w-full">
                <thead>
                    <tr class="text-left text-slate-400 border-b border-slate-700">
                        <th class="p-3">File</th>
                        <th class="p-3 text-right">Comando Rollback</th>
                    </tr>
                </thead>
                <tbody id="fileTableBody">
                    <tr><td colspan="2" class="p-10 text-center">Inizializzazione API...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE - CONTROLLA CHE SIANO ESATTI
        const CONFIG = {
            user: 'agcolella',
            repo: 'MyFirstRepo',
            folder: 'registro_files'
        };

        let allFiles = [];
        let allTags = [];

        async function init() {
            const table = document.getElementById('fileTableBody');
            try {
                // Fetch File
                const fRes = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.folder}?t=${Date.now()}`);
                if(!fRes.ok) throw new Error("Non trovo la cartella registro_files");
                allFiles = await fRes.json();

                // Fetch Tag
                const tRes = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/tags?t=${Date.now()}`);
                allTags = await tRes.json();

                // Popola UI
                document.getElementById('tagSelect').innerHTML = allTags.map(t => `<option value="${t.name}">${t.name}</option>`).join('') || '<option>No Tag</option>';
                render();
            } catch (e) {
                table.innerHTML = `<tr><td colspan="2" class="p-10 text-red-400 text-center font-bold">ERRORE: ${e.message}</td></tr>`;
            }
        }

        function render(filter = '') {
            const tbody = document.getElementById('fileTableBody');
            const tag = document.getElementById('tagSelect').value || 'v-latest';
            
            const list = allFiles.filter(f => f.name.toLowerCase().includes(filter.toLowerCase()) && f.name.endsWith('.xml'));

            if(list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-slate-500">Nessun file XML trovato</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(f => `
                <tr class="border-b border-slate-700 hover:bg-slate-700/50">
                    <td class="p-3">${f.name}</td>
                    <td class="p-3 text-right">
                        <button onclick="copy('${tag}', '${f.name}')" class="bg-blue-600 hover:bg-blue-500 text-xs py-1 px-3 rounded text-white transition">
                            Copia Rollback
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function copy(tag, name) {
            const cmd = `git checkout ${tag} -- ${CONFIG.folder}/${name}`;
            navigator.clipboard.writeText(cmd);
            alert("Comando copiato:\n" + cmd);
        }

        document.getElementById('fileSearch').addEventListener('input', (e) => render(e.target.value));
        document.getElementById('tagSelect').addEventListener('change', () => render(document.getElementById('fileSearch').value));

        init();
    </script>
</body>
</html>
