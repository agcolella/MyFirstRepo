<!DOCTYPE html>
<html>
<head>
    <title>Sblocco Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: white; padding: 40px; }
        .box { background: #2d3748; padding: 20px; border-radius: 8px; border: 1px solid #4a5568; }
        .step { margin-bottom: 10px; padding-left: 20px; border-left: 3px solid #4a5568; }
        .error { color: #fc8181; border-color: #fc8181; }
        .success { color: #68d391; border-color: #68d391; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🛠 Test di Connessione al Registro</h1>
        <div id="steps">
            <div class="step">Attendere... lo script sta partendo.</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            user: 'agcolella',
            repo: 'MyFirstRepo',
            folder: 'registro_files'
        };

        const container = document.getElementById('steps');

        function log(text, isError = false) {
            const div = document.createElement('div');
            div.className = 'step ' + (isError ? 'error' : 'success');
            div.innerText = (isError ? '❌ ' : '✅ ') + text;
            container.appendChild(div);
        }

        async function runTest() {
            try {
                log("Controllo URL: " + `https://github.com/${CONFIG.user}/${CONFIG.repo}`);
                
                // Aggiungiamo ?t=... per evitare che il browser usi versioni vecchie della pagina
                const cacheBuster = `?t=${new Date().getTime()}`;
                
                log("Chiamata API per i file...");
                const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.folder}${cacheBuster}`);
                
                if (!res.ok) {
                    throw new Error(`GitHub risponde con errore ${res.status}. Assicurati che la cartella '${CONFIG.folder}' esista nel branch main.`);
                }

                const data = await res.json();
                log(`Connessione riuscita! Trovati ${data.length} elementi.`);

                if (data.length === 0) {
                    log("ATTENZIONE: La cartella esiste ma è VUOTA. Carica un file in 'uploads' e fai il merge della PR!");
                } else {
                    data.forEach(f => log(`File rilevato: ${f.name}`));
                }

            } catch (err) {
                log(err.message, true);
            }
        }

        // Avvio immediato
        runTest();
    </script>
</body>
</html>
